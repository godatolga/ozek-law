<title>Ozek Law — LPR / Green Card</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1B2B4B}
.hidden{display:none!important}
/* LOCK */
.lock{position:fixed;inset:0;z-index:10;background:#1B2B4B;display:flex;align-items:center;justify-content:center;padding:24px}
.lock.hidden{display:none}
.lockbox{width:100%;max-width:360px;text-align:center;color:#fff}
.locklogo{width:88px;height:88px;border-radius:20px;margin-bottom:18px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.lockttl{font-size:20px;font-weight:700;letter-spacing:-.01em}
.lockcat{font-size:14px;font-weight:600;color:#B8962E;margin-top:4px}
.locksub{font-size:13.5px;color:rgba(255,255,255,.72);margin:8px 0 22px;line-height:1.45}
.lock input[type=password]{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);border-radius:12px;color:#fff;font-size:16px;padding:14px 15px;outline:none;text-align:center;letter-spacing:.04em}
.lock input[type=password]::placeholder{color:rgba(255,255,255,.55);letter-spacing:0}
.lockrem{display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:rgba(255,255,255,.82);margin:14px 0}
.lockrem input{width:16px;height:16px}
.lock #pwBtn{width:100%;background:#B8962E;color:#14110a;border:none;border-radius:12px;font-size:16px;font-weight:700;padding:15px;margin-top:2px}
.lock #pwBtn:disabled{opacity:.6}
.pwerr{color:#ffb4ac;font-size:13px;margin-top:12px;min-height:18px}
/* CHECKLIST */
#frame{position:fixed;inset:0;width:100%;height:100%;border:none;background:#fff;display:none}
#frame.on{display:block}
</style>
</head>

const $=id=>document.getElementById(id);
const LS={get(k){try{return localStorage.getItem(k)}catch(e){return _m[k]??null}},set(k,v){try{localStorage.setItem(k,v)}catch(e){_m[k]=v}},del(k){try{localStorage.removeItem(k)}catch(e){delete _m[k]}}};const _m={};
function _b(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function _derive(pw,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);}
function gunzipBytes(bytes){const ds=new DecompressionStream('gzip');return new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();}
function mobileFix(html){
  var inj='<style>@media(max-width:820px){html,body{height:auto!important;min-height:100%!important;overflow-x:hidden!important;overflow-y:auto!important}}</style>'
   +'<scr'+'ipt>(function(){function go(){if(window.innerWidth>820)return;var e=document.querySelectorAll("*");for(var i=0;i<e.length;i++){var el=e[i],c=getComputedStyle(el);if(c.display==="grid"){var p=c.gridTemplateColumns.split(" ");if(p.length===2&&parseFloat(p[0])>=280){el.style.setProperty("grid-template-columns","1fr","important");el.style.setProperty("height","auto","important");el.style.setProperty("overflow","visible","important");for(var j=0;j<el.children.length;j++){el.children[j].style.setProperty("max-height","none","important");el.children[j].style.setProperty("height","auto","important")}}}}}window.addEventListener("load",go);window.addEventListener("resize",go);document.addEventListener("DOMContentLoaded",go);setTimeout(go,200);setTimeout(go,700)})();<\/scr'+'ipt>';
  return html.indexOf('</head>')>-1?html.replace('</head>',inj+'</head>'):inj+html;
}
async function tryUnlock(pw){try{
  const p=JSON.parse(atob(PAYLOAD));
  const key=await _derive(pw,_b(p.s));
  const gz=new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:_b(p.i)},key,_b(p.c)));
  const html=await gunzipBytes(gz);
  const fr=$('frame');
  fr.srcdoc=mobileFix(html);
  $('lock').classList.add('hidden');fr.classList.add('on');
  return true;
}catch(e){return false;}}
async function doUnlock(){
  const inp=$('pwInput'),btn=$('pwBtn'),err=$('pwErr');const pw=inp.value;if(!pw)return;
  btn.disabled=true;btn.textContent='Unlocking…';err.textContent='';
  const ok=await tryUnlock(pw);
  btn.disabled=false;btn.textContent='Unlock';
  if(ok){if($('pwRemember').checked)LS.set(PW_KEY,pw);}
  else{err.textContent='That code didn’t work — check with your attorney.';inp.select();}
}
(async function(){
  if(!('crypto'in window)||!crypto.subtle){$('pwErr').textContent='Please open this in a modern browser (Safari or Chrome).';return;}
  const saved=LS.get(PW_KEY);
  if(saved){if(await tryUnlock(saved))return;LS.del(PW_KEY);}
  setTimeout(()=>{try{$('pwInput').focus();}catch(e){}},200);
})();
