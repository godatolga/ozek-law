function _b(b){const s=atob(b),u=new Uint8Array(s.length);for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i);return u;}
async function _derive(pw,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);

function gunzipBytes(bytes){const ds=new DecompressionStream('gzip');return new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();}
function mobileFix(html){
  var inj='<style>@media(max-width:820px){html,body{height:auto!important;min-height:100%!important;overflow-x:hidden!important;overflow-y:auto!important}}</style>'
   +'<scr'+'ipt>(function(){function go(){if(window.innerWidth>820)return;var e=document.querySelectorAll("*");for(var i=0;i<e.length;i++){var el=e[i],c=getComputedStyle(el);if(c.display==="grid"){var p=c.gridTemplateColumns.split(" ");if(p.length===2&&parseFloat(p[0])>=280){el.style.setProperty("grid-template-columns","1fr","important");el.style.setProperty("height","auto","important");el.style.setProperty("overflow","visible","important");for(var j=0;j<el.children.length;j++){el.children[j].style.setProperty("max-height","none","important");el.children[j].style.setProperty("height","auto","important")}}}}}window.addEventListener("load",go);window.addEventListener("resize",go);document.addEventListener("DOMContentLoaded",go);setTimeout(go,200);setTimeout(go,700)})();<\/scr'+'ipt>';

async function tryUnlock(pw){try{
